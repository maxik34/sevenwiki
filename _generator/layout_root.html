<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="color-scheme" content="dark only">
	<meta name="robots" content="noindex, nofollow">
	<link rel="icon" type="image/x-icon" href="/{{BASEURL}}/favicon.ico">
	<title>{{SITENAME}}</title>
	
	<script>
		(function()
		{
			const Supported = ['en', 'ru'];
			const UserLang = navigator.language.substring(0, 2).toLowerCase();
			const TargetLang = Supported.includes(UserLang) ? UserLang : '{{DEFAULTLANG}}';
			
			window.location.replace(`/{{BASEURL}}/${TargetLang}/{{MAINPAGE}}`);
		})();
	</script>
	
	<noscript>
		<meta http-equiv="refresh" content="0; url=/{{BASEURL}}/{{DEFAULTLANG}}/{{MAINPAGE}}">
	</noscript>
</head>
<body></body>
</html>
